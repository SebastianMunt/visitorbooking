<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Skift kodeord</title>

  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="page-container">

  <div class="card">
    <h1>Skift admin-kodeord</h1>

    <p th:if="${error}" th:text="${error}" class="error"></p>

    <p th:if="${success}" th:text="${success}" class="success"></p>

    <form action="/admin/change-password" method="post" th:object="${changePasswordDto}">

      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

      <label>Nuværende kodeord:</label><br>
      <input type="password" th:field="*{currentPassword}" required><br><br>

      <label>Nyt kodeord:</label><br>
      <input type="password" th:field="*{newPassword}" required><br><br>

      <label>Gentag nyt kodeord:</label><br>
      <input type="password" th:field="*{confirmPassword}" required><br><br>

      <button type="submit">Skift kodeord</button>

    </form>

    <a href="/admin">Tilbage til admin</a>
  </div>

</div>

</body>
</html>
