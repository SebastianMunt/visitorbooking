<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Rediger entry</title>

    <link rel="icon" type="image/png" href="/img/munt-logo.png">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="page-container">

    <div class="card">
        <h1>Rediger</h1>

        <p>
            Her kan du redigere booking, blokering eller event.
        </p>

        <p th:if="${errorMessage}" th:text="${errorMessage}" class="error"></p>
    </div>

    <div class="card">
        <h2>Rediger kalender-entry</h2>

        <form th:action="@{/admin/edit/{id}(id=${booking.id})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <label for="bookingType">Type</label>
            <select id="bookingType" name="bookingType" required>
                <option value="GUEST" th:selected="${booking.bookingType.name() == 'GUEST'}">Booking</option>
                <option value="BLOCKED" th:selected="${booking.bookingType.name() == 'BLOCKED'}">Blokering</option>
                <option value="EVENT" th:selected="${booking.bookingType.name() == 'EVENT'}">Event</option>
            </select>

            <label for="guestName">Navn / titel</label>
            <input
                    id="guestName"
                    name="guestName"
                    type="text"
                    th:value="${booking.guestName}"
                    required
            >

            <label for="startDate">Startdato</label>
            <input
                    id="startDate"
                    name="startDate"
                    type="date"
                    th:value="${booking.startDate}"
                    required
            >

            <label for="endDate">Slutdato</label>
            <input
                    id="endDate"
                    name="endDate"
                    type="date"
                    th:value="${booking.endDate}"
                    required
            >

            <label for="comment">Kommentar</label>
            <textarea
                    id="comment"
                    name="comment"
                    th:text="${booking.comment}"
            ></textarea>

            <button type="submit">Gem ændringer</button>
        </form>
    </div>

    <div class="card">
        <div class="actions">
            <a href="/admin" class="button">Tilbage til admin</a>
            <a href="/bookings" class="button">Gå til booking-side</a>
        </div>
    </div>

</div>

</body>
</html>
