<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Besøg i Barcelona</title>

    <link rel="icon" type="image/png" href="/img/munt-logo.png">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="site-header">
    <a href="/bookings" class="site-header-title">
        Book besøg
    </a>

    <a href="/admin" class="site-header-logo-link" aria-label="Admin login">
        <img src="/img/munt-logo.png" alt="Munt logo" class="site-header-logo">
    </a>
</header>

<div class="landing-page">

    <section class="landing-card">
        <p class="eyebrow">Visitor booking</p>

        <h1>Besøg os i Barcelona</h1>

        <p class="landing-text">
            Her kan venner og familie se ledige datoer og sende en bookingforespørgsel.
            Vi bekræfter datoerne bagefter.
        </p>

        <div class="landing-actions">
            <a href="/bookings" class="button">Book besøg</a>
        </div>
    </section>

</div>

</body>
</html>
