<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Admin - Visitor Booking</title>

  <link rel="stylesheet" href="/css/style.css">

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
  <script src="/js/bookings.js" defer></script>
</head>
<body>

<div class="page-container">

  <div class="card">
    <h1>Admin</h1>

    <form action="/logout" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <button type="submit">Log ud</button>
    </form>

    <p>
      <a href="/admin/change-password">Skift admin-kodeord</a>
    </p>

    <p>
      Her kan du se alle bookinger, blokere datoer og slette bookinger/blokeringer.
    </p>

    <p th:if="${error}" th:text="${error}" class="error"></p>
  </div>

  <div class="card">
    <h2>Kalender</h2>
    <div id="calendar" data-api-url="/api/bookings/admin"></div>
  </div>

  <div class="card">
    <h2>Bloker datoer</h2>

    <form action="/admin/block" method="post" th:object="${booking}">

      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

      <label>Startdato:</label><br>
      <input type="date" th:field="*{startDate}" required><br><br>

      <label>Slutdato:</label><br>
      <input type="date" th:field="*{endDate}" required><br><br>

      <label>Kommentar:</label><br>
      <textarea th:field="*{comment}" placeholder="Fx eksamen, rejse, brug for ro"></textarea><br><br>

      <button type="submit">Bloker datoer</button>

    </form>
  </div>

  <div class="card">
    <h2>Alle bookinger og blokeringer</h2>

    <table>
      <thead>
      <tr>
        <th>Type</th>
        <th>Navn</th>
        <th>Start</th>
        <th>Slut</th>
        <th>Kommentar</th>
        <th>Handling</th>
      </tr>
      </thead>

      <tbody>
      <tr th:each="booking : ${bookings}">
        <td th:text="${booking.bookingType}"></td>
        <td th:text="${booking.guestName}"></td>
        <td th:text="${booking.startDate}"></td>
        <td th:text="${booking.endDate}"></td>
        <td th:text="${booking.comment}"></td>
        <td>

          <form th:action="@{/admin/delete/{id}(id=${booking.id})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit">Slet</button>
          </form>

        </td>
      </tr>
      </tbody>
    </table>
  </div>

  <a href="/bookings">Gå til booking-side</a><br>
  <a href="/">Tilbage til forsiden</a>

</div>

</body>
</html>
