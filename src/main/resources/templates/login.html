<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Admin login</title>

  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="login-page">

  <section class="login-card">
    <p class="eyebrow">Admin</p>

    <h1>Log ind</h1>

    <p class="login-text">
      Log ind for at administrere bookinger, blokeringer og events.
    </p>

    <div th:if="${param.error}" class="error">
      Forkert brugernavn eller kodeord.
    </div>

    <div th:if="${param.logout}" class="success">
      Du er nu logget ud.
    </div>

    <form th:action="@{/login}" method="post" class="login-form">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

      <label for="username">Brugernavn</label>
      <input
              id="username"
              type="text"
              name="username"
              placeholder="Skriv brugernavn"
              required
              autofocus
      >

      <label for="password">Kodeord</label>
      <input
              id="password"
              type="password"
              name="password"
              placeholder="Skriv kodeord"
              required
      >

      <button type="submit">Log ind</button>
    </form>

    <a href="/bookings" class="back-link">Tilbage til booking-siden</a>
  </section>

</div>

</body>
</html>
